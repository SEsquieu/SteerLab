id: tool-steering-challenge-example-name
title: Replace with a concise tool steering scenario title
archetype: tool-steering-challenge
category: replace-with-topic
description: One-sentence summary of the AI-assisted engineering task.
difficulty: intermediate
estimated_time_minutes: 45
tags:
  - ai-collaboration
context: |
  Describe the task, why AI use is relevant, and what makes validation important.
  Keep the signal on engineering judgment rather than prompt theatrics.
supplied_artifacts:
  - path: artifacts/task-context.md
    kind: markdown
    purpose: Task context and constraints
candidate_instructions:
  - Describe how you would use AI assistance.
  - Show how you would constrain and verify outputs.
  - Explain what you would keep under direct human review.
evaluation_signals:
  - Uses AI inside a bounded workflow with validation discipline.
  - Distinguishes useful leverage from blind delegation.
rubric:
  strong:
    - Explains context-setting, scope control, and verification clearly.
  weak:
    - Treats AI output as trustworthy by default.
training_support:
  reflection_prompts:
    - What parts of this task should AI accelerate, and what parts require direct judgment?
    - How will you validate generated output before trusting it?
  thinking_checklist:
    - Constrain scope before asking for help
    - Define verification steps before accepting output
  hints:
    - title: Replace with first coaching hint
      content: Add a bounded nudge that helps the learner reason about scope, verification, or judgment.
  worked_examples:
    - label: Tool Steering example review
      href: /docs/example-review-tool-steering.md
